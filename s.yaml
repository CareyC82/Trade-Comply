edition: 3.0.0
name: trade-comply-ai
access: default

vars:
  region: cn-shenzhen

resources:
  tradecoai_agent:
    component: fc3
    props:
      region: ${vars.region}
      functionName: tradecomply_ai_agent
      description: Trade Comply grounded AI proxy and structured feedback storage
      runtime: nodejs20
      handler: index.handler
      memorySize: 512
      timeout: 120
      code: ./fc-package
      environmentVariables:
        DEEPSEEK_API_KEY: ${env(DEEPSEEK_API_KEY)}
        # Optional: persist feedback JSON to OSS (otherwise logged to CloudWatch only)
        OSS_BUCKET: ''
        OSS_REGION: cn-shenzhen
        OSS_ACCESS_KEY_ID: ''
        OSS_ACCESS_KEY_SECRET: ''
        OSS_FEEDBACK_PREFIX: feedback
        SUPABASE_URL: ''
        SUPABASE_KEY: ''
