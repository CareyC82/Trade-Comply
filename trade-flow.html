        <header class="trade-flow-header">
            <div class="home-header trade-flow-home-header">
                <h1 class="home-title trade-flow-page-title">📊 Trade Flow & Demand Signals</h1>
                <p class="home-subtitle">Track monthly import and export value by high-tech industry and market.</p>
            </div>

        <div class="disclaimer-bar trade-flow-disclaimer">
            <span>Official statistical signal, not a sales forecast. Compare value trends first; use quantity only when units are consistent.</span>

            <label><span>Market</span><select id="trade-flow-market" required></select></label>
            <label><span>Industry</span><select id="trade-flow-industry" required></select></label>
            <label id="trade-flow-partner-field" hidden><span>Partner</span><select id="trade-flow-partner" disabled></select></label>
            <button type="submit">View monthly flow</button>
        </form>

        <div id="trade-flow-result" class="trade-flow-result" aria-live="polite"></div>
