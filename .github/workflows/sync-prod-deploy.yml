name: Sync Prod Deploy

# After admin publish ([admin-publish] push or repository_dispatch), validate data and redeploy FC.
# GitHub Pages picks up the same push automatically.

on:
  repository_dispatch:
    types: [prod-data-published]
  workflow_dispatch:

permissions:
  contents: read
  actions: write

concurrency:
  group: sync-prod-deploy
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Validate production data
        run: |
          node scripts/validate-catalog.js
          node scripts/build-catalog.js --check
          node scripts/validate-pending-queue.js

      - name: Dispatch FC deploy workflow
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'deploy-fc.yml',
              ref: 'main'
            });
            core.info('Triggered deploy-fc.yml for latest rule library JSON.');
