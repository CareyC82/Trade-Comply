name: Policy Tracker

on:
  schedule:
    # 02:00 Asia/Shanghai (UTC+8) == 18:00 UTC previous calendar day
    - cron: "0 18 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: policy-tracker-main
  cancel-in-progress: false

jobs:
  track-policy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Fetch announcements and parse with DeepSeek
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: node scripts/run-policy-tracker.js

      - name: Commit and push if policy database changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/tags.json data/catalog.json data/inbox/manifest.json

          if git diff --staged --quiet; then
            echo "No policy tracker changes to commit."
            exit 0
          fi

          if git diff --staged --name-only | grep -q '^data/tags.json$'; then
            git commit -m "chore: auto-update policy database by AI"
          else
            git commit -m "chore: update policy fetch manifest"
          fi
          git push
