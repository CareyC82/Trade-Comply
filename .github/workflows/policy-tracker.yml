name: Policy Tracker

on:
  schedule:
    # 02:00 Asia/Shanghai (UTC+8) == 18:00 UTC previous calendar day
    - cron: "0 18 * * *"
  workflow_dispatch:

permissions:
  contents: write
  issues: write

concurrency:
  group: policy-tracker-main
  cancel-in-progress: false

jobs:
  track-policy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install Node dependencies (got-scraping for GAC TLS fingerprint)
        run: npm ci

      - name: Fetch announcements and parse with DeepSeek (auto-publish)
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: |
          echo "=== CRON JOB START: 凌晨2点政策追踪 (GitHub Actions, 非阿里云 FC) ==="
          node scripts/run-policy-tracker.js
          echo "=== CRON JOB WORKFLOW STEP DONE: policy-tracker ==="

      - name: Commit and push auto-published data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            data/tags.json \
            data/cases.json \
            data/catalog.json \
            data/pending_data.json \
            data/inbox/manifest.json

          if git diff --staged --quiet; then
            echo "No policy tracker changes to commit."
            exit 0
          fi

          if git diff --staged --name-only | grep -Eq '^data/(tags|cases|catalog)\.json$'; then
            git commit -m "auto-data: daily policy tracker update [auto-publish]"
          else
            git commit -m "chore: update policy fetch manifest"
          fi
          git push

      - name: Create guardrail cleanup GitHub Issue
        if: success()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/create-guardrail-issue.js
