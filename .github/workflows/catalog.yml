name: Catalog

on:
  push:
    branches: [main]
  pull_request:

jobs:
  catalog:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Validate catalog sources
        run: node scripts/validate-catalog.js
      - name: Verify catalog artifact is fresh
        run: node scripts/build-catalog.js --check
