name: Monthly Trade Flow Sync

on:
  schedule:
    - cron: "32 18 15 * *"
  workflow_dispatch:
    inputs:
      official_trade_flow_manifest:
        description: "Optional comma-separated repository paths to complete national official trade-flow manifests"
        required: false
        type: string
      china_customs_export_url:
        description: "Optional URL for an official China Customs XLSX/XLS/CSV/JSON export"
        required: false
        type: string
      china_customs_latest_period:
        description: "Latest month visible on the official platform (YYYY-MM)"
        required: false
        type: string
      china_customs_manifest:
        description: "Optional repository path to a China Customs batch export manifest"
        required: false
        type: string
      china_customs_required_months:
        description: "Comma-separated official months that must be complete before promotion"
        required: false
        type: string

permissions:
  contents: write
  issues: write

concurrency:
  group: monthly-trade-flow-sync
  cancel-in-progress: false

jobs:
  sync-trade-flow:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm ci

      - name: Sync official monthly trade flow
        id: trade_flow_sync
        continue-on-error: true
        env:
          CENSUS_API_KEY: ${{ secrets.CENSUS_API_KEY }}
          OFFICIAL_TRADE_FLOW_MANIFEST: ${{ inputs.official_trade_flow_manifest || vars.OFFICIAL_TRADE_FLOW_MANIFEST }}
          JP_OFFICIAL_TRADE_FLOW_URL: ${{ secrets.JP_OFFICIAL_TRADE_FLOW_URL || vars.JP_OFFICIAL_TRADE_FLOW_URL }}
          KR_OFFICIAL_TRADE_FLOW_URL: ${{ secrets.KR_OFFICIAL_TRADE_FLOW_URL || vars.KR_OFFICIAL_TRADE_FLOW_URL }}
          SG_OFFICIAL_TRADE_FLOW_URL: ${{ secrets.SG_OFFICIAL_TRADE_FLOW_URL || vars.SG_OFFICIAL_TRADE_FLOW_URL }}
          KR_DATA_GO_KR_SERVICE_KEY: ${{ secrets.KR_DATA_GO_KR_SERVICE_KEY }}
          JP_OFFICIAL_LATEST_PERIOD: ${{ vars.JP_OFFICIAL_LATEST_PERIOD }}
          KR_OFFICIAL_LATEST_PERIOD: ${{ vars.KR_OFFICIAL_LATEST_PERIOD }}
          SG_OFFICIAL_LATEST_PERIOD: ${{ vars.SG_OFFICIAL_LATEST_PERIOD }}
        run: npm run sync:trade-flow

      - name: Sync China Customs industry flow
        id: china_customs_sync
        continue-on-error: true
        env:
          CHINA_CUSTOMS_FLOW_URL: ${{ inputs.china_customs_export_url || secrets.CHINA_CUSTOMS_FLOW_URL }}
          CHINA_CUSTOMS_FLOW_MANIFEST: ${{ inputs.china_customs_manifest || vars.CHINA_CUSTOMS_FLOW_MANIFEST }}
          CHINA_CUSTOMS_LATEST_PERIOD: ${{ inputs.china_customs_latest_period || vars.CHINA_CUSTOMS_LATEST_PERIOD }}
          CHINA_CUSTOMS_REQUIRED_MONTHS: ${{ inputs.china_customs_required_months || vars.CHINA_CUSTOMS_REQUIRED_MONTHS }}
        run: npm run sync:trade-flow:cn

      - name: Verify trade-flow output
        run: node --test test/trade-flow.test.js test/trade-flow-sync.test.js test/china-customs-flow.test.js

      - name: Upload China Customs connector status
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: china-customs-connector-status
          path: |
            data/china-customs-sync-status.json
            data/china-customs-sync-plan.json
            data/china-customs-pending-batch.json
          retention-days: 30

      - name: Upload official trade-flow sync status
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: official-trade-flow-sync-status
          path: |
            data/trade-flow-sync-status.json
            data/national-trade-flow-sync-status.json
          retention-days: 30

      - name: Publish official trade-flow sync summary
        if: always()
        run: |
          node - <<'NODE' >> "$GITHUB_STEP_SUMMARY"
          const fs = require('node:fs');
          console.log('## Official monthly trade-flow sync');
          if (!fs.existsSync('data/trade-flow-sync-status.json')) {
            console.log('- No sync status was produced. Inspect the sync step logs.');
            process.exit(0);
          }
          const status = JSON.parse(fs.readFileSync('data/trade-flow-sync-status.json', 'utf8'));
          console.log(`- Result: ${status.ok ? 'complete batches published' : 'one or more connectors rejected; last-good rows retained'}`);
          console.log(`- Publish policy: ${status.publish_policy}`);
          for (const [name, connector] of Object.entries(status.connectors || {})) {
            console.log(`- ${name}: ${connector.ok ? 'OK' : 'needs attention'} · ${connector.row_count || 0} accepted row(s)${connector.skipped ? ' · skipped' : ''}`);
            if (connector.error) console.log(`  - ${connector.error}`);
            for (const batch of connector.batches || []) {
              console.log(`  - ${batch.path}: ${batch.ok ? `${batch.row_count} row(s) accepted` : `rejected · ${batch.error}`}`);
            }
          }
          if (fs.existsSync('data/national-trade-flow-sync-status.json')) {
            const national = JSON.parse(fs.readFileSync('data/national-trade-flow-sync-status.json', 'utf8'));
            console.log('');
            console.log('### National official connectors');
            for (const [market, state] of Object.entries(national.markets || {})) {
              console.log(`- ${market}: ${state.status} · official ${state.official_latest_period || 'unknown'} · synchronized ${state.synchronized_through || 'none'} · gap ${state.official_sync_gap_months ?? 'unknown'} month(s) · directions ${(state.directions || []).join('+') || 'none'} · feed ${state.feed_configured ? 'configured' : 'not configured'} · publish ${state.publish_ready ? 'ready' : 'gated'}`);
              if (state.probe_error) console.log(`  - Probe: ${state.probe_error}`);
              if (state.last_error) console.log(`  - ${state.last_error}`);
            }
          }
          NODE

      - name: Publish China Customs coverage summary
        if: always()
        run: |
          node - <<'NODE' >> "$GITHUB_STEP_SUMMARY"
          const fs = require('node:fs');
          const status = JSON.parse(fs.readFileSync('data/china-customs-sync-status.json', 'utf8'));
          const plan = JSON.parse(fs.readFileSync('data/china-customs-sync-plan.json', 'utf8'));
          console.log('## China Customs monthly industry coverage');
          console.log(`- Official platform month: ${status.official_platform_latest_period || 'unknown'}`);
          console.log(`- Synchronized through: ${status.synchronized_through || 'none'}`);
          console.log(`- Required months: ${(plan.required_periods || []).join(', ') || 'none'}`);
          console.log(`- Complete month/industry/direction cells: ${plan.completed_direction_count}/${plan.required_direction_count}`);
          console.log(`- Missing month/industry/direction cells: ${plan.missing_direction_count}/${plan.required_direction_count}`);
          console.log(`- Promotion gate: ${plan.complete ? 'complete; production may advance' : 'incomplete; last-good production retained'}`);
          console.log(`- Connector: ${status.connector_status} (${status.source_mode})`);
          if (plan.missing_periods.length) console.log(`- Missing months: ${plan.missing_periods.join(', ')}`);
          console.log('');
          console.log(status.reason || '');
          NODE

      - name: Maintain China Customs coverage issue
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('node:fs');
            const status = JSON.parse(fs.readFileSync('data/china-customs-sync-status.json', 'utf8'));
            const plan = JSON.parse(fs.readFileSync('data/china-customs-sync-plan.json', 'utf8'));
            const title = 'Data automation: China Customs monthly industry coverage';
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              per_page: 100
            });
            const existing = issues.find((issue) => issue.title === title);
            if (plan.complete) {
              if (existing) await github.rest.issues.update({ owner: context.repo.owner, repo: context.repo.repo, issue_number: existing.number, state: 'closed' });
              return;
            }
            const missingRows = plan.required_rows
              .filter((row) => row.status !== 'complete')
              .map((row) => `- ${row.month} · ${row.industry}: ${row.imports_required ? 'imports ' : ''}${row.exports_required ? 'exports' : ''}`.trim())
              .join('\n');
            const body = [
              `Official platform month: **${status.official_platform_latest_period || 'unknown'}**`,
              `Synchronized through: **${status.synchronized_through || 'none'}**`,
              `Required months: **${(plan.required_periods || []).join(', ') || 'none'}**`,
              `Missing month/industry/direction cells: **${plan.missing_direction_count}/${plan.required_direction_count}**`,
              plan.missing_periods.length ? `Missing months: ${plan.missing_periods.join(', ')}` : '',
              '',
              '### Required official values',
              missingRows || '- None',
              '',
              'Place official XLSX/XLS/CSV/JSON exports in `data/inbox/china-customs/`, configure `CHINA_CUSTOMS_FLOW_URL`, or run the workflow with a validated batch manifest.',
              '',
              `_Updated automatically by ${context.workflow} run ${context.runNumber}._`
            ].filter(Boolean).join('\n');
            if (existing) {
              await github.rest.issues.update({ owner: context.repo.owner, repo: context.repo.repo, issue_number: existing.number, body });
            } else {
              await github.rest.issues.create({ owner: context.repo.owner, repo: context.repo.repo, title, body });
            }

      - name: Commit official trade-flow snapshot
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git pull --rebase --autostash origin "${GITHUB_REF_NAME:-main}"
          git add data/trade-flow.json data/trade-flow-sync-status.json data/national-trade-flow-sync-status.json data/china-industry-flow.json data/china-customs-sync-status.json data/china-customs-sync-plan.json data/china-customs-pending-batch.json
          if git diff --staged --quiet; then
            echo "No trade-flow changes."
            exit 0
          fi
          git commit -m "auto-data: monthly official trade flow [auto-publish]"
          git pull --rebase --autostash origin "${GITHUB_REF_NAME:-main}"
          git push

      - name: Enforce official trade-flow sync health
        if: steps.trade_flow_sync.outcome == 'failure'
        run: |
          echo "One or more official trade-flow connectors failed completeness checks. Accepted batches and diagnostics were saved; last-good rows were retained for rejected scopes."
          exit 1

      - name: Enforce configured China Customs connector health
        if: steps.china_customs_sync.outcome == 'failure'
        run: |
          echo "The configured China Customs connector failed. Last-good data was preserved; inspect the uploaded status artifact."
          exit 1
