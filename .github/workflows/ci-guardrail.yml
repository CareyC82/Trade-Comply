name: CI Guardrail

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  guardrail:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Validate pending queue schema
        run: node scripts/validate-pending-queue.js

      - name: Block automation from modifying production data
        env:
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_BASE_REF: ${{ github.base_ref }}
          GITHUB_HEAD_REF: ${{ github.head_ref }}
          GITHUB_COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
        run: node scripts/check-prod-guardrail.js

      - name: Verify catalog artifact is fresh
        run: node scripts/build-catalog.js --check

      - name: Unit tests
        run: npm test
