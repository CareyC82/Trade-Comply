name: Duty Rate Auto Sync

on:
  schedule:
    # 02:12 Asia/Shanghai (UTC+8) == 18:12 UTC previous day
    - cron: "12 18 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: duty-rate-auto-sync
  cancel-in-progress: false

jobs:
  sync-duty-rates:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm ci

      - name: Run duty-rate auto sync
        run: npm run sync:duty-rates:auto

      - name: Refresh automation launch status
        run: npm run build:automation-launch-status

      - name: Refresh exact tariff parser priorities
        run: npm run update:exact-tariff-parser-priorities

      - name: Verify maintained route coverage
        run: npm run check:route-coverage

      - name: Verify duty-rate sync output
        run: npm test

      - name: Print duty-rate sync diagnostics
        if: always()
        run: node scripts/print-duty-rate-sync-diagnostics.js

      - name: Upload duty-rate diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: duty-rate-sync-diagnostics
          path: |
            data/duty-rate-sync-status.json
            data/automation-launch-status.json
            data/exact-tariff-parser-priorities.json
          if-no-files-found: ignore

      - name: Commit duty-rate sync data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git pull --rebase --autostash origin "${GITHUB_REF_NAME:-main}"
          git add \
            data/duty-rate-sources.json \
            data/duty-rates.json \
            data/duty-rate-sync-status.json \
            data/automation-launch-status.json \
            data/exact-tariff-parser-priorities.json

          if git diff --staged --quiet; then
            echo "No duty-rate sync changes."
            exit 0
          fi

          git commit -m "auto-data: daily duty-rate sync [auto-publish]"
          git pull --rebase --autostash origin "${GITHUB_REF_NAME:-main}"
          git push
