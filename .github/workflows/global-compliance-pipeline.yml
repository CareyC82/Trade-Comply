name: Global Compliance Pipeline

on:
  schedule:
    # 02:00 Asia/Shanghai (UTC+8) == 18:00 UTC previous day
    - cron: "5 18 * * *"
  workflow_dispatch:
    inputs:
      offline:
        description: "Use offline fixtures only"
        required: false
        default: "false"

permissions:
  contents: write
  issues: write

concurrency:
  group: global-compliance-pipeline
  cancel-in-progress: false

jobs:
  scrape-and-publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Python dependencies
        run: pip install -r pipeline/requirements.txt

      - name: Run global compliance pipeline (auto-publish)
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: |
          if [ "${{ github.event.inputs.offline }}" = "true" ]; then
            python3 pipeline/pipeline.py --offline
          else
            python3 pipeline/pipeline.py || python3 pipeline/pipeline.py --offline
          fi

      - name: Commit auto-published production data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            data/tags.json \
            data/cases.json \
            data/catalog.json \
            data/pending_data.json \
            data/pending_data/pipeline_batch.json \
            data/pending_data/guardrail_report.json

          if git diff --staged --quiet; then
            echo "No pipeline publish changes."
            exit 0
          fi

          git commit -m "auto-data: daily regulatory update [auto-publish]"
          git push

      - name: Create guardrail cleanup GitHub Issue
        if: success()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/create-guardrail-issue.js
